<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVZGE Sync</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrapper">
                <img src="icons/icon48.png" alt="Logo" class="logo">
            </div>
            <div class="header-text">
                <h1 data-t="app_name">PVZGE Sync</h1>
                <small id="last-sync" data-t="no_sync">Chưa có bản đồng bộ nào</small>
            </div>
            <button id="btn-settings" class="btn-settings-icon" title="Cài đặt">⚙️</button>
        </header>

        <main>
            <div id="error-banner" class="error-banner" style="display:none;"></div>
            <div class="status-indicator">
                <span id="status-dot" class="dot"></span>
                <span id="status-text" data-t="status_no_github">Đang kiểm tra...</span>
            </div>

            <!-- Cloud Section -->
            <section class="action-section cloud">
                <div class="section-header">
                    <span class="section-icon">☁️</span>
                    <h3 data-t="cloud_sync">Cloud Sync</h3>
                </div>
                <div class="button-group">
                    <button id="btn-upload" class="btn primary full-width">
                        <span data-t="btn_upload">Lưu lên Đám mây (Upload)</span>
                    </button>
                    <button id="btn-download" class="btn secondary full-width">
                        <span data-t="btn_download">Tải về từ Đám mây (Download)</span>
                    </button>
                </div>
            </section>

            <!-- Local Section -->
            <section class="action-section local">
                <div class="section-header">
                    <span class="section-icon">💾</span>
                    <h3 data-t="offline_backup">Offline Backup</h3>
                </div>
                <div class="button-grid">
                    <button id="btn-export" class="btn outline">
                        <span data-t="btn_export">Xuất file JSON</span>
                    </button>
                    <button id="btn-import" class="btn outline">
                        <span data-t="btn_import">Nhập file JSON</span>
                    </button>
                </div>
            </section>

            <input type="file" id="file-input" style="display: none;" accept=".json">
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 data-t="settings_title">Cài đặt GitHub</h2>
                    <button id="btn-close-settings" class="close-x">&times;</button>
                </div>
                
                <div class="input-group">
                    <label data-t="lang_label">Ngôn ngữ</label>
                    <select id="select-lang" style="width: 100%; background: var(--bg); color: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px;">
                        <option value="en">English</option>
                        <option value="vi">Tiếng Việt</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>GitHub Personal Access Token:</label>
                    <input type="password" id="input-token" placeholder="ghp_xxxxxxxxxxxx">
                    <div class="help-box">
                        <p><span data-t="help_no_token">Chưa có Token?</span> <a href="https://github.com/settings/tokens/new?description=PVZGE%20Sync&scopes=gist" target="_blank" data-t="help_click_here">Nhấn vào đây để tạo</a></p>
                        <ul>
                            <li data-t="help_step1">Chọn quyền <b>'gist'</b> khi tạo.</li>
                            <li data-t="help_step2">Copy và dán mã vào ô trên.</li>
                        </ul>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="btn-save-settings" class="btn primary full-width" data-t="btn_save">Lưu cài đặt</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
